name: Build Image
run-name: Build ${{ inputs.distro || 'cachyos' }}

on:
  workflow_dispatch:
    inputs:
      distro:
        description: Distribution
        default: cachyos
        type: choice
        options:
          - all
          - ubuntu2604
          - mint22-cinnamon
          - debian13-xfce
          - debian13-server
          - debian13-gnome
          - debian13-kde
          - debian13-proxmox
          - arch
          - cachyos
          - alpine
          - fedora-gnome
          - fedora-kde
          - bazzite
          - bazzite-deck
          - batocera
          - artix-openrc
          - devuan-sway
          - miaos
  workflow_call:
    inputs:
      distro:
        type: string
        default: cachyos

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      distros: ${{ steps.set.outputs.distros }}
    steps:
      - id: set
        run: |
          INPUT="${{ inputs.distro || 'cachyos' }}"
          if [ "$INPUT" = "all" ]; then
            # Skip bazzite-deck (24 GB raw, may not fit on the runner) for now.
            echo 'distros=["ubuntu2604","mint22-cinnamon","debian13-xfce","debian13-server","debian13-gnome","debian13-kde","debian13-proxmox","arch","cachyos","alpine","fedora-gnome","fedora-kde","bazzite","batocera","artix-openrc","devuan-sway","miaos"]' >> "$GITHUB_OUTPUT"
          else
            echo "distros=[\"$INPUT\"]" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        distro: ${{ fromJson(needs.matrix.outputs.distros) }}

    steps:
      - name: Free disk space
        # Strip ~30 GB of pre-installed tooling we never use. easimon's
        # maximize-build-space carves an LVM volume out of the existing
        # disk, but Docker stores images at /var/lib/docker (on the root
        # FS) — when root fills, build_image.sh fails immediately. Skip
        # the LVM carve and just delete unused tooling in place so the
        # full ~80 GB stays on / where docker (and build_image.sh) write.
        run: |
          set -euxo pipefail
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/lib/node_modules \
            /opt/ghc \
            /opt/google \
            /opt/microsoft \
            /opt/pipx \
            /usr/share/swift \
            /usr/share/miniconda \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache kernel build (per PATCHES_REF + MWIFIEX_REF)
        uses: actions/cache@v4
        with:
          path: |
            work/linux
            linux-bin
            ccache
          key: kernel-${{ hashFiles('build_image.sh') }}-${{ runner.os }}
          restore-keys: |
            kernel-

      - name: Build ${{ matrix.distro }} image
        env:
          CI: 'true'
        run: |
          # Retry once on transient mirror / network errors.
          bash build_image.sh --distro "${{ matrix.distro }}" || \
            ( sudo rm -rf work/chroot && bash build_image.sh --distro "${{ matrix.distro }}" )

      - name: Compress image
        run: |
          xz -T0 -9 -c "output/ps5-${{ matrix.distro }}.img" \
            > "output/ps5-${{ matrix.distro }}.img.xz"
          rm -f "output/ps5-${{ matrix.distro }}.img"
          ls -lh output/

      - name: Split if > 1.9 GB (GitHub release-asset cap is 2 GB)
        run: |
          F="output/ps5-${{ matrix.distro }}.img.xz"
          SZ=$(stat -c%s "$F")
          MAX=$((1900*1024*1024))
          if [ "$SZ" -gt "$MAX" ]; then
            split -b 1900M -d -a 1 "$F" "$F.part-"
            rm "$F"
          fi
          ls -lh output/

      - name: Generate per-distro checksums
        run: |
          cd output
          sha256sum ps5-${{ matrix.distro }}.img.xz* > "ps5-${{ matrix.distro }}.sha256"
          cat "ps5-${{ matrix.distro }}.sha256"

      - name: Ensure 'latest' release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view latest -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create latest -R "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "PS5 Linux — latest" \
              --notes "Auto-built by GitHub Actions. Images >1.9 GB are split — reassemble with: \`cat ps5-<distro>.img.xz.part-* > ps5-<distro>.img.xz\` before \`xz -d\`."
          fi

      - name: Replace this distro's assets on 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete prior assets for THIS distro only (other distros keep theirs).
          mapfile -t OLD < <(gh release view latest -R "$GITHUB_REPOSITORY" --json assets \
            -q ".assets[].name" | grep -E "^ps5-${{ matrix.distro }}\.")
          for f in "${OLD[@]}"; do
            gh release delete-asset -R "$GITHUB_REPOSITORY" latest "$f" --yes || true
          done
          gh release upload latest -R "$GITHUB_REPOSITORY" \
            output/ps5-${{ matrix.distro }}.img.xz* \
            output/ps5-${{ matrix.distro }}.sha256 \
            --clobber
