image:
  name: ps5-miaos
  distribution: archlinux
  description: MiaOS — gaming-mode (gamescope+Steam) + KDE desktop mode for PS5
  architecture: x86_64

source:
  downloader: archlinux-http
  url: https://geo.mirror.pkgbuild.com/iso
  skip_verification: true

packages:
  manager: pacman
  update: true
  cleanup: true

  repositories:
  - name: mirrorlist
    url: |-
      Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch

  sets:
  - packages:
    # Gaming session core
    - gamescope
    - steam
    - mangohud
    - lib32-mangohud
    - gamemode
    - lib32-gamemode

    # X / Wayland fallback (for SSH-launched X apps + Xwayland inside gamescope)
    - xorg-server
    - xorg-xwayland
    - xorg-xinit
    - xorg-xhost

    # Audio / media
    - pipewire
    - wireplumber
    - pipewire-pulse
    - pipewire-alsa
    - alsa-utils

    # Display / GPU (AMD) — DC-only path required for PS5
    - mesa
    - lib32-mesa
    - vulkan-radeon
    - lib32-vulkan-radeon
    - libva-mesa-driver
    - lib32-libva-mesa-driver
    - vulkan-icd-loader
    - lib32-vulkan-icd-loader
    - xf86-video-amdgpu
    - libinput
    - xkeyboard-config

    # Controllers (PS5 native, Xbox via hid-generic, 8BitDo etc)
    - libusb
    - lib32-libusb
    - sdl2
    - lib32-sdl2

    # KDE Plasma — desktop mode (SteamOS-style switch out of Big Picture).
    # Wayland session only; no SDDM (we start plasma-wayland from tty1).
    - plasma-desktop
    - plasma-wayland-protocols
    - plasma-workspace
    - kwin
    - konsole
    - dolphin
    - kate
    - firefox
    - breeze
    - breeze-gtk
    - xdg-desktop-portal-kde
    - plasma-nm
    - kdeplasma-addons

    # Bluetooth (KDE applet + daemon + bluetoothctl)
    - bluez
    - bluez-utils
    - bluedevil

    # Networking
    - networkmanager
    - linux-firmware

    # System
    - base
    - openssh
    - sudo
    - nano
    - vim
    - bash
    - mkinitcpio
    - kmod
    - e2fsprogs
    - parted
    - gptfdisk
    - cloud-guest-utils
    - polkit
    - dbus
    - seatd
    - kexec-tools
    - util-linux

    # Fonts
    - ttf-dejavu
    - ttf-liberation
    - noto-fonts
    - noto-fonts-cjk
    - noto-fonts-emoji
    - ttf-font-awesome
    - fontconfig
    action: install

files:
- path: /etc/hostname
  generator: hostname

- path: /etc/hosts
  generator: hosts

- path: /etc/kernel/postinst.d/zz-update-boot
  generator: copy
  source: /tmp/build-staging/zz-update-boot
  mode: "0755"

- path: /etc/fstab
  generator: copy
  source: /tmp/build-staging/fstab

- path: /usr/local/sbin/grow-rootfs
  generator: copy
  source: /tmp/build-staging/grow-rootfs
  mode: "0755"

- path: /etc/systemd/system/grow-rootfs.service
  generator: copy
  source: /tmp/build-staging/grow-rootfs.service

- path: /opt/pkgs/
  generator: copy
  source: /tmp/build-staging/pkgs

- path: /usr/local/sbin/first-boot-setup
  generator: copy
  source: /tmp/build-staging/first-boot-setup
  mode: "0755"

actions:
- trigger: post-unpack
  action: |-
    #!/bin/bash
    set -eux
    sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf

    pacman-key --init
    pacman-key --populate archlinux

    curl -fsSL "https://archlinux.org/mirrorlist/?country=all&protocol=https&use_mirror_status=on" \
        | sed 's/^#Server/Server/' > /etc/pacman.d/mirrorlist

    # Enable [multilib] for lib32-* packages
    cat >> /etc/pacman.conf <<'EOF'

    [multilib]
    Include = /etc/pacman.d/mirrorlist
    EOF

    pacman -Syy --noconfirm


- trigger: post-packages
  action: |-
    #!/bin/bash
    set -eux
    fc-cache -f 2>/dev/null || true

    # Ensure gcc-libs / libstdc++ are at the same version as the gamescope
    # and Steam binaries shipped by cachyos/arch. CachyOS publishes
    # gamescope linked against the newest libstdc++.so.6 (GLIBCXX_3.4.35+)
    # but the bootstrap pacman -S step often resolves an older gcc-libs
    # snapshot during the image build, producing a "GLIBCXX_3.4.35 not
    # found" runtime error and a tty1 respawn loop on first boot.
    #
    # Force-refresh just these two (plus their lib32 counterparts) without
    # doing a full -Syu, which would pull in CachyOS *-v3 glibc/pacman
    # variants that break QEMU image-build hooks.
    pacman -Syy --noconfirm
    pacman -S --noconfirm --needed       gcc-libs libstdc++ lib32-gcc-libs lib32-libstdc++ || true


    symlink_wants() {
      local src=$1
      local target=$2
      [ -e "$src" ] || return 0
      mkdir -p "/etc/systemd/system/${target}.wants"
      ln -sf "$src" "/etc/systemd/system/${target}.wants/$(basename "$src")"
    }

    sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/'               /etc/ssh/sshd_config
    sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
    symlink_wants /usr/lib/systemd/system/sshd.service multi-user.target
    symlink_wants /usr/lib/systemd/system/NetworkManager.service multi-user.target
    symlink_wants /usr/lib/systemd/system/seatd.service multi-user.target
    symlink_wants /usr/lib/systemd/system/bluetooth.service multi-user.target
    for s in pipewire pipewire-pulse wireplumber; do
      symlink_wants "/usr/lib/systemd/system/${s}.service" default.target || true
    done

    # Skip systemd-firstboot's interactive timezone/locale prompt on first
    # boot. It blocks tty1 until the user answers — and on the PS5 the
    # autologin gamer + immediate gamescope race past it, leaving the prompt
    # visible only briefly before the display goes black.
    ln -sf /usr/share/zoneinfo/UTC /etc/localtime
    echo "LANG=en_US.UTF-8" > /etc/locale.conf
    echo "en_US.UTF-8 UTF-8" > /etc/locale.gen
    locale-gen 2>/dev/null || true

- trigger: post-files
  action: |-
    #!/bin/bash
    set -eux
    mkdir -p /etc/systemd/system/local-fs.target.wants
    ln -sf /etc/systemd/system/grow-rootfs.service \
      /etc/systemd/system/local-fs.target.wants/grow-rootfs.service

    # gamer/gamer user. Groups: wheel (sudo), seat (seatd), input/video/render
    # (gamescope + direct controller access — no inputplumber daemon, which
    # grabs /dev/input and breaks gamescope on PS5).
    useradd -m -G wheel,seat,input,video,render -s /bin/bash gamer
    echo "gamer:gamer" | chpasswd
    echo "%wheel ALL=(ALL:ALL) NOPASSWD: ALL" > /etc/sudoers.d/wheel

    # Autologin gamer on tty1, then launch gamescope+steam from .bash_profile.
    mkdir -p /etc/systemd/system/getty@tty1.service.d
    cat > /etc/systemd/system/getty@tty1.service.d/override.conf <<'EOF'
    [Service]
    ExecStart=
    ExecStart=-/usr/bin/agetty --autologin gamer --noclear %I $TERM
    EOF

    # Override the OS identity so the system shows as MiaOS instead of
    # "Arch Linux" in motd, login banner, neofetch, etc. On Arch
    # /etc/os-release is a symlink to /usr/lib/os-release — write through
    # to the canonical target. Keep ID_LIKE=arch for distro-detect scripts.
    cat > /usr/lib/os-release <<'EOF'
    NAME="MiaOS"
    PRETTY_NAME="MiaOS"
    ID=miaos
    ID_LIKE=arch
    BUILD_ID=rolling
    HOME_URL="https://git.etawen.dev/mia/ps5-linux-image"
    SUPPORT_URL="https://discord.gg/v3zHCRfHE"
    LOGO=archlinux-logo
    EOF
    echo "MiaOS" > /etc/hostname

    # Mode-switch convention: /etc/ps5-mode holds either "gaming" or
    # "desktop". bash_profile picks the session accordingly. Switch
    # scripts (/usr/local/bin/{gaming,desktop}-mode) rewrite the file
    # and kill the current session — getty re-autologins and starts the
    # other session.
    # /etc/ps5-mode left here only for the legacy desktop-mode helper.
    echo desktop > /etc/ps5-mode
    chmod 666 /etc/ps5-mode

    cat > /home/gamer/.bash_profile <<'EOF'
    if [ -z "$DISPLAY" ] && [ "$XDG_VTNR" = 1 ]; then
        export XDG_RUNTIME_DIR=/run/user/$(id -u)
        export XDG_SESSION_TYPE=wayland
        export LIBSEAT_BACKEND=seatd
        [ -d "$XDG_RUNTIME_DIR" ] || (mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR")

        # Always boot Plasma. Steam Big Picture is launched as a KWin client
        # via the XDG autostart entry under ~/.config/autostart/. Closing the
        # Steam window drops to the Plasma desktop — no compositor swap, no
        # gamescope -> KWin DRM-master handoff (which on PS5 hits an amdgpu
        # link-training failure on the DP->HDMI bridge and goes dark).
        #
        # Per-game gamescope is opt-in via Steam launch options, e.g.
        #   gamescope -W 1920 -H 1080 -- %command%
        exec >/tmp/plasma.log 2>&1
        set -x
        export DESKTOP_SESSION=plasma
        exec startplasma-wayland
        # If session exits (crash, user quit), drop to a bash login so the
        # user can ssh in / read the log. Avoids a spin-restart loop that
        # hides errors.
    fi
    EOF

    # /usr/local/bin/gaming-mode + desktop-mode: write the new mode,
    # then kill the current session — getty re-autologins and starts
    # the requested one. Both are sudo-NOPASSWD via the wheel rule.
    # NOTE: pkill -KILL <name> (without -f) matches the kernel comm field,
    # which gamescope rewrites at runtime via prctl(PR_SET_NAME) to
    # "gamescope-wl". `pkill gamescope` therefore misses the actual process
    # and the session never terminates — the next-mode session never starts
    # and Steam's "Switch to Desktop" appears to hang. Use -f (matches full
    # command line) to catch gamescope, gamescope-wl, gamescopereaper, every
    # steam child, every plasma child regardless of their runtime renaming.
    cat > /usr/local/bin/desktop-mode <<'EOF'
    #!/bin/sh
    # Switch miaos to KDE Plasma desktop session.
    sudo sh -c 'echo desktop > /etc/ps5-mode'
    sudo pkill -KILL -u gamer -f 'gamescope|steam' 2>/dev/null
    EOF
    chmod 755 /usr/local/bin/desktop-mode

    cat > /usr/local/bin/gaming-mode <<'EOF'
    #!/bin/sh
    # Switch miaos back to gamescope + Steam Big Picture.
    sudo sh -c 'echo gaming > /etc/ps5-mode'
    sudo pkill -KILL -u gamer -f 'startplasma|kwin_wayland|plasmashell' 2>/dev/null
    EOF
    chmod 755 /usr/local/bin/gaming-mode

    # Steam Big Picture's "Power -> Switch to Desktop" hard-codes a call to
    # /usr/bin/steamos-session-select. Without this shim Steam hangs on a
    # "switching to desktop" dialog forever because the binary it expects
    # doesn't exist. Shim delegates to our desktop-mode / gaming-mode.
    cat > /usr/bin/steamos-session-select <<'EOF'
    #!/bin/sh
    case "${1:-}" in
        desktop|plasma|plasma-wayland|plasmax11)
            exec /usr/local/bin/desktop-mode
            ;;
        gamescope|steam|steamos|gaming)
            exec /usr/local/bin/gaming-mode
            ;;
        *)
            echo >&2 "steamos-session-select: unknown session '$1'"
            exit 1
            ;;
    esac
    EOF
    chmod 755 /usr/bin/steamos-session-select

    # Steam library shortcut so "Return to Desktop" can be added from the
    # Big Picture games list.
    mkdir -p /home/gamer/.local/share/applications
    cat > /home/gamer/.local/share/applications/return-to-desktop.desktop <<'EOF'
    [Desktop Entry]
    Type=Application
    Name=Return to Desktop
    Comment=Switch miaos to KDE Plasma desktop session
    Exec=/usr/local/bin/desktop-mode
    Icon=preferences-desktop
    Categories=System;
    EOF

    # KDE desktop shortcut: when the user is in Plasma, give them a
    # one-click way back into gamescope+Steam. The .desktop file lives
    # in ~/Desktop/ so it shows up as an icon on the Plasma desktop
    # view; +x and KIO trusted metadata bypass the "untrusted launcher"
    # prompt that Plasma 6 shows for fresh-from-disk launchers.
    mkdir -p /home/gamer/Desktop
    cat > /home/gamer/Desktop/return-to-gaming-mode.desktop <<'EOF'
    [Desktop Entry]
    Type=Application
    Version=1.0
    Name=Return to Gaming Mode
    Comment=Quit Plasma and re-launch gamescope + Steam Big Picture
    Exec=steamos-session-select gaming
    Icon=applications-games
    Terminal=false
    Categories=Game;System;
    EOF
    chmod +x /home/gamer/Desktop/return-to-gaming-mode.desktop

    # XDG autostart: launch Steam Big Picture on KDE login. User can close
    # the Steam window to drop to Plasma desktop, or relaunch via the
    # ~/Desktop/return-to-gaming-mode shortcut.
    install -d -m 700 /home/gamer/.config/autostart
    cat > /home/gamer/.config/autostart/steam-bigpicture.desktop <<'EOF'
    [Desktop Entry]
    Type=Application
    Name=Steam Big Picture
    Comment=Launch Steam in gamepad UI at KDE login
    Exec=steam -gamepadui
    Icon=steam
    Terminal=false
    Categories=Game;
    X-GNOME-Autostart-enabled=true
    X-KDE-AutostartPhase=1
    EOF

    # KDE polish — fires before the first session so the user lands straight
    # in Steam BPM with no splash flash and no idle dim/sleep.
    cat > /home/gamer/.config/ksplashrc <<'EOF'
    [KSplash]
    Engine=none
    Theme=None
    EOF

    cat > /home/gamer/.config/powermanagementprofilesrc <<'EOF'
    [AC][DPMSControl]
    idleTime=-1
    lockBeforeTurnOff=0

    [AC][DimDisplay]
    idleTime=-1

    [AC][SuspendSession]
    idleTime=-1
    suspendType=0

    [AC][HandleButtonEvents]
    lidAction=0
    powerButtonAction=16
    powerDownAction=16
    triggerLidActionWhenExternalMonitorPresent=false

    [Battery][DPMSControl]
    idleTime=-1
    [Battery][DimDisplay]
    idleTime=-1
    [Battery][SuspendSession]
    idleTime=-1
    [LowBattery][DPMSControl]
    idleTime=-1
    [LowBattery][DimDisplay]
    idleTime=-1
    [LowBattery][SuspendSession]
    idleTime=-1
    EOF

    cat > /home/gamer/.config/kscreenlockerrc <<'EOF'
    [Daemon]
    Autolock=false
    LockOnResume=false
    Timeout=0
    EOF

    # KWin window rule: force Steam (wmclass=steam) fullscreen + above,
    # so plasmashell isn't visible behind it during the Steam splash window.
    cat > /home/gamer/.config/kwinrulesrc <<'EOF'
    [General]
    count=1
    rules=steam-bpm-1

    [steam-bpm-1]
    Description=Steam Big Picture fullscreen
    fullscreen=true
    fullscreenrule=2
    above=true
    aboverule=2
    wmclass=steam
    wmclasscomplete=false
    wmclassmatch=1
    types=1
    EOF

    # Silence the bouncing-cursor app-launch feedback while Steam is starting.
    cat > /home/gamer/.config/klaunchrc <<'EOF'
    [BusyCursorSettings]
    Bell=false
    Blinking=false
    Bouncing=false
    TaskbarButton=false
    EOF

    chown -R gamer:gamer /home/gamer

    # ---- SteamOS-compatibility stubs ----
    # Steam Big Picture's "Switch to Desktop" button (and several other
    # Deck-specific code paths) only invoke steamos-session-select / our
    # mode-switch shim when Steam decides the host is a SteamOS-like
    # environment. The detection looks at /etc/os-release (ID/VARIANT_ID)
    # and the presence of /usr/bin/steamos-readonly. Without these the
    # button does some "log off" fallback that just SIGKILLs Steam +
    # gamescope — which on PS5 hardware causes the amdgpu DRM-master
    # release to fail link training (perform_8b_10b_clock_recovery_sequence
    # error, link 0 fails) and the display goes dark before any next
    # session can come up.
    #
    # Keep the upstream /etc/os-release at /etc/os-release.arch in case
    # any tool needs the real ID. Pacman & most package tooling care
    # about ID_LIKE rather than ID, so set that to "arch" to keep them
    # happy.
    cp /etc/os-release /etc/os-release.arch
    cat > /etc/os-release <<'EOF'
    NAME="MiaOS"
    PRETTY_NAME="MiaOS — SteamOS-compatible PS5"
    ID=steamos
    ID_LIKE="arch"
    ANSI_COLOR="38;2;23;147;209"
    BUILD_ID=rolling
    VARIANT="Steam Deck"
    VARIANT_ID=steamdeck
    HOME_URL="https://etawen.dev/"
    EOF

    cat > /etc/lsb-release <<'EOF'
    DISTRIB_ID=SteamOS
    DISTRIB_RELEASE=rolling
    DISTRIB_DESCRIPTION="MiaOS — SteamOS-compatible PS5"
    EOF

    cat > /usr/bin/steamos-readonly <<'EOF'
    #!/bin/sh
    # miaos stub: SteamOS distinguishes between read-only (atomic /usr)
    # and rw modes. We are always rw. Some Steam paths check this binary
    # exists and run it with status / enable / disable verbs.
    case "${1:-status}" in
        status) echo disabled ;;
        enable|disable) ;;
        *) echo "miaos-stub: unknown verb $1" >&2 ;;
    esac
    exit 0
    EOF
    chmod +x /usr/bin/steamos-readonly

    [ -f /etc/vconsole.conf ] || echo "KEYMAP=us" > /etc/vconsole.conf
    sed -i 's/ autodetect//' /etc/mkinitcpio.conf

    # Install our custom kernel packages
    if ls /opt/pkgs/*.pkg.tar.zst 1>/dev/null 2>&1; then
        pacman -U --noconfirm --ask 4 /opt/pkgs/*.pkg.tar.zst
        rm -rf /opt/pkgs
        KVER=$(ls -1t /lib/modules | head -1)
        mkinitcpio -k "$KVER" -g "/boot/initrd.img-$KVER" || true
    fi

    mkdir -p /boot/efi
    /etc/kernel/postinst.d/zz-update-boot

    # IgnorePkg is only honoured under [options]. Appending to end of
    # pacman.conf lands it under [multilib] — pacman ignores it and
    # complains every Syu. Insert directly after the [options] header.
    sed -i '/^IgnorePkg/d' /etc/pacman.conf
    sed -i '/^\[options\]/a IgnorePkg = linux-ps5' /etc/pacman.conf
- trigger: post-files
  action: |-
    #!/bin/bash
    # Pre-configure repo.etawen.dev (mia's signed kernel repo) so users get
    # linux-ps5 updates via pacman -Syu after first boot.
    set -eux
    curl -fsSL https://repo.etawen.dev/key.asc | pacman-key --add -
    pacman-key --lsign-key E40FB2409C9AD5243762294293AB12C4159FEDAB
    if ! grep -q "^\[ps5\]" /etc/pacman.conf; then
        cat >> /etc/pacman.conf <<EOF

    [ps5]
    SigLevel = Required DatabaseRequired
    Server = https://repo.etawen.dev/arch
    EOF
    fi


mappings:
  architecture_map: archlinux
