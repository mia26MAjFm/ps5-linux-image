image:
  name: ps5-kali
  distribution: debian
  # Release images use Kali's last snapshot for stable, repeatable builds.
  release: kali-last-snapshot
  description: Kali Linux XFCE desktop
  architecture: x86_64

source:
  downloader: debootstrap
  url: https://kali.download/kali
  variant: minbase
  keyserver: keyserver.ubuntu.com
  keys:
  - 0x827C8569F2518CC677FECA1AED65462EC8D5E4C5

packages:
  manager: apt
  update: true
  cleanup: true

  repositories:
  - name: sources.list
    url: |-
      deb https://kali.download/kali kali-last-snapshot main contrib non-free non-free-firmware
    architectures:
    - amd64

  sets:
  - packages:
    # Full Kali desktop and toolset
    - kali-desktop-xfce
    - kali-linux-everything
    - kali-defaults
    - kali-defaults-desktop
    - kali-themes
    - kali-wallpapers-2026
    - kali-wallpapers-all
    - kali-menu
    - kali-tweaks
    - kali-undercover

    # Display / GPU / audio
    - lightdm
    - lightdm-gtk-greeter
    - xserver-xorg
    - xserver-xorg-video-amdgpu
    - dbus-x11
    - x11-xserver-utils
    - mesa-vulkan-drivers
    - pipewire
    - pipewire-pulse
    - wireplumber
    - pavucontrol

    # Networking and remote access
    - network-manager
    - network-manager-gnome
    - openssh-server
    - iputils-ping
    - ntpsec
    - iw
    - wpasupplicant
    - wireless-regdb

    # Firmware and PS5 boot support
    - firmware-linux
    - firmware-linux-nonfree
    - firmware-amd-graphics
    - firmware-realtek
    - firmware-atheros
    - firmware-mediatek
    - firmware-misc-nonfree
    - initramfs-tools
    - kexec-tools
    - kmod
    - busybox
    - zstd
    - systemd-zram-generator

    # Base system utilities
    - sudo
    - cloud-guest-utils
    - parted
    - e2fsprogs
    - usbutils
    - pciutils
    - rfkill
    - util-linux
    - curl
    - wget
    - git
    - ca-certificates
    - build-essential
    - bc
    - bison
    - flex
    - libssl-dev
    - libelf-dev
    - vim
    - nano
    - tmux
    - firefox-esr
    # Ghidra 12.1 requires JDK 21. The full Kali set also installs newer JDKs.
    - openjdk-21-jdk
    action: install

files:
- path: /etc/hostname
  generator: hostname

- path: /etc/hosts
  generator: hosts

- path: /etc/machine-id
  generator: dump

- path: /etc/kernel/postinst.d/zz-update-boot
  generator: copy
  source: /tmp/build-staging/zz-update-boot
  mode: "0755"

- path: /etc/fstab
  generator: copy
  source: /tmp/build-staging/fstab

- path: /etc/apt/trusted.gpg.d/kali-archive-keyring.asc
  generator: copy
  source: /tmp/build-staging/kali-archive-keyring.asc

- path: /usr/local/sbin/grow-rootfs
  generator: copy
  source: /tmp/build-staging/grow-rootfs
  mode: "0755"

- path: /etc/systemd/system/grow-rootfs.service
  generator: copy
  source: /tmp/build-staging/grow-rootfs.service

- path: /opt/debs/
  generator: copy
  source: /tmp/build-staging/debs

