packages:
  manager: apt
  update: true
  cleanup: true

  repositories:
  - name: sources.list
    url: |-
      deb http://deb.devuan.org/merged excalibur main contrib non-free non-free-firmware
      deb http://deb.devuan.org/merged excalibur-updates main contrib non-free non-free-firmware
      deb http://deb.devuan.org/merged excalibur-security main contrib non-free non-free-firmware
    architectures:
    - amd64

  sets:
  - packages:
    # Init — sysvinit + sysv-rc is Devuan's default. systemd-sysv is masked
    # in the merged archive; pulling sysvinit-core explicitly is belt-and-
    # braces so debootstrap doesn't pick up libsystemd-shim or similar.
    - sysvinit-core
    - sysv-rc
    - sysvinit-utils
    - orphan-sysvinit-scripts
    # eudev is Devuan's udev replacement (Gentoo's fork). policykit-1 still
    # needs elogind for session tracking on a non-systemd box.
    - eudev
    - elogind
    - libpam-elogind

    # Desktop: sway (Wayland tiling WM) + greetd for autologin
    - sway
    - swaybg
    - swayidle
    - swaylock
    - waybar
    - foot
    - wofi
    - xdg-desktop-portal-wlr
    - xwayland
    - greetd

    # Display / GPU — keep mesa-vulkan + amdgpu firmware; drop the xorg
    # server itself (sway is Wayland-native, xwayland handles X clients).
    - mesa-vulkan-drivers
    - libdrm-amdgpu1
    - xserver-xorg-video-amdgpu
    - firmware-amd-graphics
    - firmware-linux
    - firmware-linux-free
    - firmware-linux-nonfree
    - firmware-misc-nonfree
    - firmware-realtek
    - firmware-iwlwifi
    - firmware-atheros

    # Audio — pipewire on a non-systemd box runs as a user-session service
    # autostarted by the XDG autostart spec; no system-level enable needed.
    - pipewire
    - pipewire-pulse
    - wireplumber
    - pipewire-alsa
    - alsa-utils

    # Networking — Devuan's network-manager package depends on elogind,
    # not systemd-logind, and ships an /etc/init.d/network-manager script.
    - network-manager
    - network-manager-gnome
    - wpasupplicant
    - wireless-tools
    - iw
    # No systemd-resolved on Devuan, and the `resolvconf` package's
    # postinst fails inside distrobuilder's chroot (it tries to bind a
    # tail file under /run/resolvconf/ that doesn't exist as a tmpfs).
    # NetworkManager 1.28+ can manage /etc/resolv.conf as a plain file
    # via rc-manager=file — no helper needed. Configured below.

    # System
    - dbus
    - openssh-server
    - gnupg
    - ca-certificates
    - sudo
    - initramfs-tools
    - kmod
    - kexec-tools
    - cloud-guest-utils
    - e2fsprogs
    - dosfstools
    - parted
    - pciutils
    - usbutils
    - nvme-cli
    - ca-certificates

    # Base tools
    - nano
    - vim
    - htop
    - wget
    - curl
    - git
    - build-essential
    - bash-completion

    # Fonts
    - fonts-liberation
    - fonts-dejavu
    - fontconfig

    # Kernel build deps
    - flex
    - gawk
    - bison
    - dwarves
    - libelf-dev
    - libssl-dev
    - libncurses-dev
    action: install

files:
- path: /etc/hostname
  generator: hostname

- path: /etc/hosts
  generator: hosts

- path: /etc/NetworkManager/conf.d/dns.conf
  generator: copy
  source: /tmp/build-staging/nm-dns.conf

# Pre-provisioned WiFi credential drop. perms 0600 — NM rejects keyfiles
# more permissive than that. **STRIP BEFORE PUSHING TO ORIGIN.**
- path: /etc/NetworkManager/system-connections/wifi.nmconnection
  generator: copy
  source: /tmp/build-staging/wifi.nmconnection
  mode: "0600"

- path: /etc/kernel/postinst.d/zz-update-boot
  generator: copy
  source: /tmp/build-staging/zz-update-boot
  mode: "0755"

- path: /etc/fstab
  generator: copy
  source: /tmp/build-staging/fstab

- path: /usr/local/sbin/grow-rootfs
  generator: copy
  source: /tmp/build-staging/grow-rootfs
  mode: "0755"

- path: /etc/init.d/grow-rootfs
  generator: copy
  source: /tmp/build-staging/grow-rootfs.sysv
  mode: "0755"

- path: /opt/debs/
  generator: copy
  source: /tmp/build-staging/debs

actions:
- trigger: post-unpack
  action: |-
    #!/bin/bash
    set -eux
    rm -f /var/lib/apt/lists/*InRelease /var/lib/apt/lists/*Release /var/lib/apt/lists/*Packages* || true
    echo 'Acquire::Retries "10";' > /etc/apt/apt.conf.d/80retry
    # debootstrap leaves /etc/apt/trusted.gpg.d/ empty for Devuan (Ubuntu's
    # debootstrap script doesn't know to install devuan-archive-keyring).
    # Drop the keyring inline as base64 so apt-get update can verify
    # excalibur InRelease before the keyring package is installed.
    mkdir -p /etc/apt/trusted.gpg.d
