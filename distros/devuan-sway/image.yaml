- trigger: post-update
  action: |-
    #!/bin/bash
    set -eux
    passwd -l root

- trigger: post-packages
  action: |-
    #!/bin/bash
    set -eux
    fc-cache -f -v

    # SSH
    sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/'               /etc/ssh/sshd_config
    sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
    # sysv-rc: update-rc.d defaults adds links into /etc/rc{2-5}.d
    update-rc.d ssh defaults || true

    # greetd: autologin ps5, launch sway immediately. No display manager,
    # no display server selection — single Wayland session.
    mkdir -p /etc/greetd
    cat > /etc/greetd/config.toml <<GREETD
    [terminal]
    vt = 1

    [default_session]
    command = "sway"
    user = "ps5"
    GREETD
    update-rc.d greetd defaults || true

    # NetworkManager + elogind under sysv
    update-rc.d network-manager defaults || true
    update-rc.d elogind defaults || true
    update-rc.d dbus defaults || true

    # NetworkManager manages /etc/resolv.conf directly as a plain file
    # (rc-manager=file). No systemd-resolved on Devuan and we skip
    # resolvconf because its postinst won't run in a distrobuilder chroot.
    mkdir -p /etc/NetworkManager/conf.d
    cat > /etc/NetworkManager/conf.d/10-resolv.conf <<NM
    [main]
    rc-manager=file
    dns=default
    NM
    # Don't truncate /etc/resolv.conf here — distrobuilder bind-mounts
    # the host's file in for chroot DNS, and truncating breaks the
    # later post-files actions that hit the network. NM will overwrite
    # it cleanly on the first DHCP lease after boot.

- trigger: post-files
  action: |-
    #!/bin/bash
    set -eux
    # Enable the grow-rootfs sysv script at runlevels 2-5.
    update-rc.d grow-rootfs defaults || true

    # Create user
    useradd -m -s /bin/bash -G sudo,video,audio,input,render,plugdev,netdev ps5
    echo "ps5:ps5" | chpasswd
    echo "ps5 ALL=(ALL:ALL) NOPASSWD: ALL" > /etc/sudoers.d/ps5
    chmod 440 /etc/sudoers.d/ps5

    # Install ps5-linux kernel .debs
    mkdir -p /boot/efi
    rm -f /etc/kernel/postinst.d/kdump-tools
    dpkg -i /opt/debs/*.deb
    rm -rf /opt/debs
    KVER=$(ls -1t /lib/modules | head -1)
    update-initramfs -c -k "$KVER"
    /etc/kernel/postinst.d/zz-update-boot "$KVER"

    # amdgpu config
    cat > /etc/modprobe.d/ps5-amdgpu.conf <<MODPROBE
    options amdgpu dpm=0 gpu_recovery=0
    MODPROBE

    # Serial console — no systemd, so add an inittab entry for ttyTitania0
    # alongside the default tty1..tty6 lines. Devuan's /etc/inittab uses
    # the sysv `getty` syntax.
    if [ -f /etc/inittab ] && ! grep -q 'ttyTitania0' /etc/inittab; then
        printf '\n# PS5 serial console\nT0:23:respawn:/sbin/getty -L ttyTitania0 115200 vt100\n' >> /etc/inittab
    fi

    # Hold linux-ps5 against upstream replacement.
    apt-mark hold linux-ps5 || true
- trigger: post-files
  action: |-
    #!/bin/bash
    # Pre-configure repo.etawen.dev (mia's signed kernel repo) so users get
    # linux-ps5 updates via apt-get upgrade after first boot.
    set -eux
    install -d -m 755 /etc/apt/keyrings
    curl -fsSL https://repo.etawen.dev/key.asc \
        | gpg --dearmor -o /etc/apt/keyrings/etawen-ps5.gpg
    chmod 644 /etc/apt/keyrings/etawen-ps5.gpg
    cat > /etc/apt/sources.list.d/etawen-ps5.list <<EOF
    deb [signed-by=/etc/apt/keyrings/etawen-ps5.gpg] https://repo.etawen.dev/deb ./
    EOF


