    - gnupg
    - network-manager
    - linux-firmware
    - initramfs-tools
    - kmod
    - dialog
    - sudo
    - nano
    - cloud-guest-utils
    - kexec-tools
    - fonts-ubuntu
    - fonts-liberation
    - fonts-dejavu
    - fontconfig
    - systemd-zram-generator
    - git
    - flex
    - gawk
    - bison
    - dwarves
    - libelf-dev
    - libssl-dev
    - libncurses-dev
    - fonts-noto-cjk
    - fonts-noto-color-emoji
    action: install

files:
- path: /etc/hostname
  generator: hostname

- path: /etc/hosts
  generator: hosts

- path: /etc/machine-id
  generator: dump

- path: /etc/NetworkManager/conf.d/dns.conf
  generator: copy
  source: /tmp/build-staging/nm-dns.conf

- path: /etc/kernel/postinst.d/zz-update-boot
  generator: copy
  source: /tmp/build-staging/zz-update-boot
  mode: "0755"

- path: /etc/fstab
  generator: copy
  source: /tmp/build-staging/fstab

- path: /usr/local/sbin/grow-rootfs
  generator: copy
  source: /tmp/build-staging/grow-rootfs
  mode: "0755"

- path: /etc/systemd/system/grow-rootfs.service
  generator: copy
  source: /tmp/build-staging/grow-rootfs.service

- path: /opt/debs/
  generator: copy
  source: /tmp/build-staging/debs

actions:
- trigger: post-unpack
  action: |-
    #!/bin/bash
    set -eux
    # Clear stale apt lists to avoid InRelease split errors after debootstrap
    rm -f /var/lib/apt/lists/*InRelease /var/lib/apt/lists/*Release /var/lib/apt/lists/*Packages* || true
    # Retry up to 10 times on transient 429/network errors
    echo 'Acquire::Retries "10";' > /etc/apt/apt.conf.d/80retry
    apt-get update

- trigger: post-update
  action: |-
    #!/bin/bash
    set -eux
    passwd -l root

- trigger: post-packages
  action: |-
    #!/bin/bash
    set -eux
    fc-cache -f -v

    # SSH — password auth only, root login via sudo
    sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/'               /etc/ssh/sshd_config
    sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
    systemctl enable ssh

    # zram swap: half of RAM, zstd compressed
    printf '[zram0]\nzram-size = ram / 2\ncompression-algorithm = zstd\n' > /etc/systemd/zram-generator.conf

- trigger: post-files
  action: |-
    #!/bin/bash
    set -eux
    systemctl enable grow-rootfs.service
    systemctl enable systemd-resolved
    mkdir -p /boot/efi
    # Disable kdump postinst hook — it fails in chroot (can't resolve root device)
    rm -f /etc/kernel/postinst.d/kdump-tools
    dpkg -i /opt/debs/*.deb
    rm -rf /opt/debs
    KVER=$(ls -1t /lib/modules | head -1)
    update-initramfs -c -k "$KVER"
    /etc/kernel/postinst.d/zz-update-boot "$KVER"

    # Hold linux-ps5 — `apt upgrade` would otherwise replace our patched
    # kernel with an upstream Ubuntu kernel and break boot. Binaries +
    # source tree are pre-staged by entrypoint.sh at /opt/ps5-linux-tools.
    apt-mark hold linux-ps5 || true
- trigger: post-files
  action: |-
    #!/bin/bash
    # Pre-configure repo.etawen.dev (mia's signed kernel repo) so users get
    # linux-ps5 updates via apt-get upgrade after first boot.
    set -eux
    install -d -m 755 /etc/apt/keyrings
    curl -fsSL https://repo.etawen.dev/key.asc \
        | gpg --dearmor -o /etc/apt/keyrings/etawen-ps5.gpg
    chmod 644 /etc/apt/keyrings/etawen-ps5.gpg
    cat > /etc/apt/sources.list.d/etawen-ps5.list <<EOF
    deb [signed-by=/etc/apt/keyrings/etawen-ps5.gpg] https://repo.etawen.dev/deb ./
    EOF


mappings:
  architecture_map: debian
