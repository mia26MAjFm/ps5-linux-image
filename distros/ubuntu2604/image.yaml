image:
  name: ps5-ubuntu2604
  distribution: ubuntu
  release: resolute
  description: Ubuntu Resolute desktop
  architecture: x86_64

source:
  downloader: debootstrap
  url: http://archive.ubuntu.com/ubuntu
  variant: minbase
  keyserver: keyserver.ubuntu.com
  keys:
  - 0x790BC7277767219C42C86F933B4FE6ACC0B21F32
  - 0xf6ecb3762474eda9d21b7022871920d1991bc93c

packages:
  manager: apt
  update: true
  cleanup: true

  repositories:
  - name: sources.list
    url: |-
      deb http://archive.ubuntu.com/ubuntu {{ image.release }} main restricted universe multiverse
      deb http://archive.ubuntu.com/ubuntu {{ image.release }}-updates main restricted universe multiverse
      deb http://security.ubuntu.com/ubuntu {{ image.release }}-security main restricted universe multiverse
    architectures:
    - amd64

  # kisak-mesa: newer mesa than stock Ubuntu — needed for the GFX1013 amdgpu
  # patch ("amd/addrlib: Add more GFX1013 GPUs", mesa 26.1+) that's required
  # for the PS5 Oberon GPU. Without it, the stock mesa shipped in {{ image.release }}
  # lacks the addrlib entries for the PS5 ASIC and most games hit graphical
  # glitches or black-screen on first frame. See upstream loader README §5.
  - name: kisak-mesa.list
    url: |-
      deb https://ppa.launchpadcontent.net/kisak/kisak-mesa/ubuntu {{ image.release }} main
    architectures:
    - amd64
