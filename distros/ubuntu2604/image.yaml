  sets:
  - packages:
    - ubuntu-desktop
    - gnome-software
    - firefox
    - openssh-server
    - build-essential
    # Required by the post-files action that adds the etawen-ps5 apt repo —
    # cloud-image-minimal Ubuntu doesn't ship curl, and the curl|gpg pipe
    # silently fails ("no valid OpenPGP data found") without it.
